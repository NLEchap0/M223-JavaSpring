<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *{color: #222;}
    body {background-color: #3c3c3c;}
  </style>
</head>
<body class="bg-black">


<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-10 col-xl-8">
      <div class="card shadow-2-strong bg-dark text-white border-secondary" style="border-radius: 15px; overflow: hidden;">
        <div class="card-header bg-black bg-gradient border-secondary py-3">
          <h3 class="mb-0 text-center fw-light">
            <i class="bi bi-person-plus-fill me-2 text-info"></i>NEW INSTRUMENT
          </h3>
        </div>

        <div class="card-body p-4 p-md-5">
          <form method="POST" th:action="@{/saveInstrument}" th:object="${instrument}" class="needs-validation">

            <div class="row g-4">
              <div class="col-md-6">
                <label for="type" class="form-label small text-uppercase tracking-wider text-info fw-bold">Type</label>
                <input type="text" id="type" th:field="*{type}"
                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                       th:classappend="${#fields.hasErrors('type')} ? 'is-invalid'"
                       placeholder="Ex: Piano, Guitar" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('type')}" th:errors="*{type}">Type not valid</div>
              </div>

              <div class="col-md-6">
                <label for="brand" class="form-label small text-uppercase tracking-wider text-info fw-bold">Brand</label>
                <input type="text" id="brand" th:field="*{brand}"
                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                       th:classappend="${#fields.hasErrors('brand')} ? 'is-invalid'"
                       placeholder="Ex: Yamaha, Ibanez" required/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}">Brand not valid</div>
              </div>


              <div class="col-md-12">
                <label for="model" class="form-label small text-uppercase text-info fw-bold">Model</label>
                <input type="text" id="model" th:field="*{model}"
                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                       th:classappend="${#fields.hasErrors('model')} ? 'is-invalid'"
                       placeholder="Ex: STA Special Edition, TL-239Z"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('model')}" th:errors="*{model}">Error model</div>
              </div>

              <div class="col-md-6">
                <label for="price" class="form-label small text-uppercase text-info fw-bold">Price</label>
                <input type="number" id="price" th:field="*{price}"
                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                       placeholder="Ex: 2039"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}">Price not valid</div>
              </div>

              <div class="col-md-6">
                <label for="stock" class="form-label small text-uppercase text-info fw-bold">Stock</label>
                <input type="number" id="stock" th:field="*{stock}"
                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                       th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'"
                       placeholder="Ex: 10"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}">Stock not valid</div>
              </div>
            </div>

            <div class="mt-5 pt-4 border-top border-secondary text-center">
              <div class="mb-4">
                <button type="submit" class="btn btn-info btn-lg px-5 py-3 fw-bold text-dark shadow hover-scale w-100 w-md-auto">
                  SALVA CLIENTE <i class="bi bi-cloud-arrow-up-fill ms-2"></i>
                </button>
              </div>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .custom-input:focus {
    background-color: #1a1a1a !important;
    border-color: #0dcaf0 !important;
    box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
    color: white !important;
  }
  .hover-scale { transition: transform 0.2s; }
  .hover-scale:hover { transform: scale(1.05); }
  .hover-opacity:hover { opacity: 0.8; }
  .tracking-wider { letter-spacing: 1px; }
  .custom-input::placeholder {
    color: rgba(255, 255, 255, 0.5) !important;/
  font-style: italic;
    font-size: 0.9rem;
  }
  .custom-input:focus::placeholder {
    color: rgba(13, 202, 240, 0.7) !important;
  }
  .custom-input {
    background-color: #1a1a1a !important;
    border: 1px solid #444 !important;
    color: #ffffff !important;
  }
</style>


</body>
</html>
