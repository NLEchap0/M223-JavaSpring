<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Store</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *{color: #222;}
    body {background-color: #3c3c3c;}
  </style>
</head>
<body>
<div class="container-fluid mt-5">
  <div class="row justify-content-center">
    <div style="width: 80%;" class="px-md-5">

      <div class="text-center mb-5">
        <h1 class="display-4 fw-bold text-white mb-2">Music <span class="text-info">Store</span></h1>
        <p class="lead text-info opacity-75">Visualize all the music instruments that are in your DataBase</p>
      </div>

      <div class="card shadow-lg bg-dark text-light border-secondary mb-5" style="border-radius: 15px; overflow: hidden;">

        <div class="card-header bg-black bg-gradient border-secondary py-4">
          <h2 class="mb-4 text-center text-uppercase fw-light tracking-wider">
            <i class="bi bi-people-fill me-2 text-info"></i>Music Instruments
          </h2>
        </div>

        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-dark table-hover align-middle mb-0">
              <thead class="bg-black border-bottom border-secondary">
              <tr class="text-info text-uppercase small tracking-wider">
                <th class="py-4 ps-4">ID</th>
                <th class="py-4">Type</th>
                <th class="py-4">Brand</th>
                <th class="py-4">Model</th>
                <th class="py-4 ">Price</th>
                <th class="py-4 text-center">Stock</th>
              </tr>
              </thead>
              <tbody>
              <tr th:each="instrument : ${instruments}" class="border-bottom border-secondary border-opacity-25">
                <td class="ps-4 text-secondary fw-bold" th:text="${'#' + instrument.id}"></td>
                <td class="fs-5 text-white opacity-75" th:text="${instrument.type}"></td>
                <td class="fs-5 text-white opacity-75" th:text="${instrument.brand}"></td>
                <td class="fs-5 text-white opacity-75" th:text="${instrument.model}"></td>
                <td class="fs-5 text-white fw-bold" th:text="${instrument.price}"></td>

                <td class="text-center">
                  <span class="badge bg-info text-dark px-3 py-2 fs-6 fw-bold" th:text="'Available: ' + ${instrument.stock}"></span>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(instruments)}">
                <td colspan="6" class="text-center py-5 text-secondary fs-4">
                  No instruments found.
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
