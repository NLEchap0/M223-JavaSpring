<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PostList | My Blog</title>
    <style>
        /* Reset e Font */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Navigazione */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .btn-nav {
            text-decoration: none;
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            transition: background 0.3s ease;
            font-weight: bold;
        }

        .btn-nav:hover {
            background-color: #2980b9;
        }

        /* Contenitore Post (Grid) */
        .posts-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card del Post */
        .post-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .post-card:hover {
            transform: translateY(-5px);
        }

        .post-title {
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: #2c3e50;
        }

        .post-author {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 15px;
        }

        .post-stats {
            font-weight: bold;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        /* Azioni */
        .post-actions {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .post-actions a {
            text-decoration: none;
            font-weight: bold;
        }

        .link-detail { color: #3498db; }
        .link-like {
            background: #f1f1f1;
            padding: 5px 10px;
            border-radius: 5px;
            text-decoration: none;
        }

        .link-like:hover { background: #e1e1e1; }

    </style>
</head>
<body>

<h1>Mio Blog Personale</h1>

<div class="nav-container">
    <a href="/blog/new" class="btn-nav">✍️ Nuovo Post</a>
    <a href="/blog/best" class="btn-nav" style="background-color: #f1c40f; color: #2c3e50;">🔥 I Migliori</a>
</div>

<div class="posts-container">
    <div class="post-card" th:each="post : ${posts}">
        <div>
            <h2 class="post-title" th:text="${post.title}">Titolo del Post</h2>
            <p class="post-author">Scritto da: <span th:text="${post.author}">Autore</span></p>
            <p class="post-stats">❤️ <span th:text="${post.likes}">0</span> Like</p>
        </div>

        <div class="post-actions">
            <a th:href="@{/blog/post(postid=${post.id})}" class="link-detail">Leggi tutto →</a>
            <a th:href="@{/blog/like(postid=${post.id})}" class="link-like">👍 Like</a>
        </div>
    </div>
</div>

</body>
</html>
