<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>GardenWareHouse</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
      <style>
        *{color: #222;}
        body {background-color: #3c3c3c;}
      </style>
  </head>
  <body>
    <div class="container-fluid mt-5">
      <div class="row justify-content-center">
        <div style="width: 80%;" class="px-md-5">

          <div class="text-center mb-5">
            <h1 class="display-4 fw-bold text-white mb-2">Database <span class="text-info">Clienti</span></h1>
            <p class="lead text-info opacity-75">Visualizza e gestisci tutti i record salvati</p>
          </div>

          <div class="card shadow-lg bg-dark text-light border-secondary mb-5" style="border-radius: 15px; overflow: hidden;">

            <div class="card-header bg-black bg-gradient border-secondary py-4">
              <h2 class="mb-4 text-center text-uppercase fw-light tracking-wider">
                <i class="bi bi-people-fill me-2 text-info"></i>Archivio Clienti
              </h2>

              <div class="d-flex align-items-center px-md-5">
                <div class="input-group">
                  <input id="searchInput" class="form-control bg-dark text-white border-secondary custom-input-nav"
                         type="search"
                         placeholder="Cerca per codice articolo (es. 0abc-1)..."
                         aria-label="Search" required>

                  <button id="searchBtn" class="btn btn-info fw-bold text-dark px-4" type="button">
                    <i class="bi bi-search me-2"></i>CERCA
                  </button>
                </div>
              </div>
            </div>

            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-dark table-hover align-middle mb-0">
                  <thead class="bg-black border-bottom border-secondary">
                  <tr class="text-info text-uppercase small tracking-wider">
                    <th class="py-4 ps-4">ID</th>
                    <th class="py-4">Code</th>
                    <th class="py-4">Type</th>
                    <th class="py-4">Name</th>
                    <th class="py-4 ">Price</th>
                    <th class="py-4 text-center">Item Count</th>
                  </tr>
                  </thead>
                  <tbody>
                  <tr th:each="item : ${items}" class="border-bottom border-secondary border-opacity-25">
                    <td class="ps-4 text-secondary fw-bold" th:text="${'#' + item.id}"></td>
                    <td class="fw-bold fs-5 text-white" th:text="${item.code}"></td>
                    <td class="fs-5 text-white opacity-75" th:text="${item.type}"></td>
                    <td class="fs-5 text-white opacity-75" th:text="${item.name}"></td>
                    <td class="fs-5 text-white opacity-75" th:text="${item.price}"></td>

                    <td class="text-center">
                      <span class="badge bg-info text-dark px-3 py-2 fs-6 fw-bold" th:text="'Available: ' + ${item.itemCount}"></span>
                    </td>
                  </tr>
                  <tr th:if="${#lists.isEmpty(items)}">
                    <td colspan="5" class="text-center py-5 text-secondary fs-4">
                      Nessun cliente registrato nel sistema.
                    </td>
                  </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
  <script>
    document.getElementById('searchBtn').addEventListener('click', function() {
      const query = document.getElementById('searchInput').value;
      if (query.trim() !== "") {
        // Reindirizza l'utente all'URL dinamico
        window.location.href = "/items/" + encodeURIComponent(query);
      }
    });

    // Permette di premere "Invio" sulla tastiera per cercare
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        document.getElementById('searchBtn').click();
      }
    });
  </script>
</html>
