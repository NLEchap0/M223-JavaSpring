<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reservations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<table>
  <thead>
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Surname</th>
    <th>Age</th>
    <th>Reservation ID</th>
    <th>Room</th>
    <th>Check-in</th>
    <th>Check-out</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="reservation : ${reservations}">
    <td th:text="${reservation.customer.id}"></td>
    <td th:text="${reservation.customer.name}"></td>
    <td th:text="${reservation.customer.surname}"></td>
    <td th:text="${reservation.customer.age}"></td>
    <td th:text="${reservation.id}"></td>
    <td th:text="${reservation.room}"></td>
    <td th:text="${reservation.checkin}"></td>
    <td th:text="${reservation.checkout}"></td>
  </tr>
  </tbody>
</table>
</body>
</html>
