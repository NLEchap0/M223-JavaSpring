<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Surname</th>
                <th>Age</th>
                <th>Address</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="customer : ${customers}">
                <td th:text="${customer.id}"></td>
                <td th:text="${customer.name}"></td>
                <td th:text="${customer.surname}"></td>
                <td th:text="${customer.age}"></td>
                <td th:text="${customer.address.street}"></td>
                <td th:text="${customer.address.num}"></td>
                <td th:text="${customer.address.zip}"></td>
                <td th:text="${customer.address.city}"></td>
                <td th:text="${customer.address.nation}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
