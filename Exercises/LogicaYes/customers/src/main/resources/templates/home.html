<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-black bg-opacity-75 text-white">

<th:block th:replace="~{fragments/navbar :: navbar}"></th:block>

<div class="card">
    <div class="card-header">
        <h1>
            Customer Manager
        </h1>

        <form method="POST" th:object="${customer}">
    <!--<div>
        <label for="id">Id:</label>
        <input type="number" id="id" th:field="*{id}" placeholder="Insert the id" required/>
        <span class="validationError"
            th:if="${#fields.hasErrors('id')}"
            th:errors="${customer.id}">Name Error
        </span>
    </div>-->
            <div class="card-body">
                <div>
                    <label for="name">Name:</label>
                    <input type="text" id="name" th:field="*{name}" placeholder="Insert the name" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('name')}"
                          th:errors="${customer.name}">Name Error
                    </span>
                </div>
                <div>
                    <label for="surname">Surname:</label>
                    <input type="text" id="surname" th:field="*{surname}"  placeholder="Insert the surname" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('surname')}"
                          th:errors="${customer.surname}">Name Error
                    </span>
                </div>
                <div>
                    <label for="age">Age:</label>
                    <input type="number" id="age" th:field="*{age}" placeholder="Insert the age" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('age')}"
                          th:errors="${customer.age}">Name Error
                    </span>
                </div>
                <div>
                    <label for="street">Street:</label>
                    <input type="text" id="street" th:field="*{address.street}" placeholder="Insert the street" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('address.street')}"
                          th:errors="${customer.address.street}">Name Error
                    </span>
                </div>
                <div>
                    <label for="num">Num:</label>
                    <input type="number" id="num" th:field="*{address.num}" placeholder="Insert the num" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('address.num')}"
                          th:errors="${customer.address.num}">Name Error
                    </span>
                </div>
                <div>
                    <label for="zip">Zip:</label>
                    <input type="text" id="zip" th:field="*{address.zip}" placeholder="Insert the zip" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('address.zip')}"
                          th:errors="${customer.address.zip}">Name Error
                    </span>
                </div>
                <div>
                    <label for="city">City:</label>
                    <input type="text" id="city" th:field="*{address.city}" placeholder="Insert the city" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('address.city')}"
                          th:errors="${customer.address.city}">Name Error
                    </span>
                </div>
                <div>
                    <label for="nation">Nation:</label>
                    <input type="text" id="nation" th:field="*{address.nation}" placeholder="Insert the nation" required/>
                    <span class="validationError"
                          th:if="${#fields.hasErrors('address.nation')}"
                          th:errors="${customer.address.nation}">Name Error
                    </span>
                </div>
                <div>
                    <button type="submit">Save Customer</button>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
</html>
