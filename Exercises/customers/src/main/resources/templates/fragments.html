<th:block th:fragment="Heared-Default">
  <meta charset="UTF-8">
  <title>Customer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *{color: #222;}
    body {background-color: #3c3c3c;}
  </style>
</th:block>


<th:block th:fragment="navbar">
  <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary shadow-sm py-3">
    <div class="container-fluid px-md-5">
      <a class="navbar-brand fw-bold text-uppercase tracking-wider" href="/">
        <i class="bi bi-people-fill text-info me-2"></i>Customer <span class="text-info">Manager</span>
      </a>

      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link px-3 hover-info" aria-current="page" href="/">
              <i class="bi bi-house-door me-1"></i> Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 hover-info" href="/loadCustomers">
              <i class="bi bi-list-ul me-1"></i> Lista Clienti
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <style>
    .bg-black { background-color: #000000 !important; }

    /* Seleziona specificamente il link per cambiare colore senza spostarlo */
    .navbar-nav .nav-link {
      transition: color 0.3s ease;
      display: flex; /* Mantiene icona e testo allineati */
      align-items: center;
      /* Assicuriamoci che il padding sia costante */
      padding-left: 1rem !important;
      padding-right: 1rem !important;
    }

    /* Hover solo sul colore, senza toccare margini o padding */
    .navbar-nav .nav-link:hover {
      color: #0dcaf0 !important;
      background-color: transparent !important; /* Evita sfondi grigi di default */
    }

    /* Fix per l'input di ricerca */
    .custom-input-nav {
      border-left: none !important;
      box-shadow: none !important; /* Toglie l'alone blu che sposta i bordi */
    }

    .custom-input-nav:focus {
      background-color: #212529 !important;
      color: white !important;
      border-color: #0dcaf0 !important;
    }

    .custom-input-nav::placeholder {
      color: rgba(255, 255, 255, 0.4) !important;
      font-size: 0.85rem;
    }

    .tracking-wider { letter-spacing: 1px; }

    /* Forza l'allineamento delle icone */
    .bi {
      line-height: 0;
      vertical-align: middle;
    }
  </style>
</th:block>
