<!DOCTYPE html>
<html lang="en">
<head>
    <th:block th:replace="~{fragments :: Heared-Default}"></th:block>
</head>
<body class="bg-black">

<th:block th:replace="~{fragments :: navbar}"></th:block>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">

            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold text-white mb-2">Benvenuto nella Home!</h1>
                <p class="lead text-info opacity-75">Registra un nuovo cliente nel sistema</p>
            </div>

            <div class="card shadow-2-strong bg-dark text-white border-secondary" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-black bg-gradient border-secondary py-3">
                    <h3 class="mb-0 text-center fw-light">
                        <i class="bi bi-person-plus-fill me-2 text-info"></i>NUOVA ANAGRAFICA
                    </h3>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form method="POST" th:action="@{/addCustomer}" th:object="${customer}" class="needs-validation">

                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label small text-uppercase tracking-wider text-info fw-bold">Nome</label>
                                <input type="text" id="name" th:field="*{name}"
                                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                       placeholder="Es: Mario" required/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Errore nome</div>
                            </div>

                            <div class="col-md-6">
                                <label for="surname" class="form-label small text-uppercase tracking-wider text-info fw-bold">Cognome</label>
                                <input type="text" id="surname" th:field="*{surname}"
                                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                                       th:classappend="${#fields.hasErrors('surname')} ? 'is-invalid'"
                                       placeholder="Es: Rossi" required/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}">Errore cognome</div>
                            </div>

                            <div class="col-md-4">
                                <label for="age" class="form-label small text-uppercase tracking-wider text-info fw-bold">Età</label>
                                <input type="number" id="age" th:field="*{age}"
                                       class="form-control form-control-lg bg-dark text-white border-secondary custom-input"
                                       th:classappend="${#fields.hasErrors('age')} ? 'is-invalid'"
                                       placeholder="0" required/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('age')}" th:errors="*{age}">Errore età</div>
                            </div>

                            <div class="col-12 mt-4">
                                <h5 class="text-info border-bottom border-secondary pb-2 small text-uppercase tracking-widest">Indirizzo di Residenza</h5>
                            </div>

                            <div class="col-md-9">
                                <label class="form-label small text-uppercase text-info fw-bold">Via / Strada</label>
                                <input type="text" th:field="*{address.street}"
                                       class="form-control bg-dark text-white border-secondary custom-input" placeholder="Es: Via Caratti" required/>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small text-uppercase text-info fw-bold">N°</label>
                                <input type="text" th:field="*{address.num}"
                                       class="form-control bg-dark text-white border-secondary custom-input" placeholder="67" required/>
                            </div>

                            <div class="col-md-3">
                                <label class="form-label small text-uppercase text-info fw-bold">NAP / ZIP</label>
                                <input type="text" th:field="*{address.zip}"
                                       class="form-control bg-dark text-white border-secondary custom-input" placeholder="6500" required/>
                            </div>

                            <div class="col-md-5">
                                <label class="form-label small text-uppercase text-info fw-bold">Città</label>
                                <input type="text" th:field="*{address.city}"
                                       class="form-control bg-dark text-white border-secondary custom-input" placeholder="Bellinzona" required/>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label small text-uppercase text-info fw-bold">Nazione</label>
                                <input type="text" th:field="*{address.nation}"
                                       class="form-control bg-dark text-white border-secondary custom-input" placeholder="Svizzera" required/>
                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-top border-secondary text-center">
                            <button type="submit" class="btn btn-info btn-lg px-5 py-3 fw-bold text-dark shadow hover-scale w-100 w-md-auto">
                                SALVA CLIENTE <i class="bi bi-cloud-arrow-up-fill ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-input {
        background-color: #1a1a1a !important;
        border: 1px solid #444 !important;
        color: #ffffff !important;
        transition: all 0.2s;
    }
    .custom-input:focus {
        background-color: #1a1a1a !important;
        border-color: #0dcaf0 !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
    }
    .hover-scale { transition: transform 0.2s; }
    .hover-scale:hover { transform: scale(1.03); }
    .tracking-wider { letter-spacing: 1px; }
</style>

</body>
</html>
