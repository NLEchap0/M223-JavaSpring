<!DOCTYPE html>
<html lang="en">
<head>
    <th:block th:replace="~{fragments :: Heared-Default}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments :: navbar}"></th:block>

<div class="container-fluid mt-5">
    <div class="row justify-content-center">
        <div style="width: 80%;" class="px-md-5">

            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold text-white mb-2">Gruppi <span class="text-info">Pasti</span></h1>
                <p class="lead text-info opacity-75">Visualizza e gestisci i gruppi pasto e i clienti iscritti</p>
            </div>

            <div class="card shadow-lg bg-dark text-light border-secondary mb-5" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-black bg-gradient border-secondary py-4">
                    <h2 class="mb-0 text-center text-uppercase fw-light tracking-wider text-info">
                        <i class="bi bi-egg-fill me-2"></i>Lista Gruppi Pasto
                    </h2>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover align-middle mb-0">
                            <thead class="bg-black border-bottom border-secondary">
                            <tr class="text-info text-uppercase small tracking-wider">
                                <th class="py-4 ps-4">ID Gruppo</th>
                                <th class="py-4">Nome Gruppo</th>
                                <th class="py-4">Descrizione</th>
                                <th class="py-4">Clienti Iscritti</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="mealGroup : ${mealGroups}" class="border-bottom border-secondary border-opacity-25">
                                <td class="ps-4 text-secondary fw-bold" th:text="${'#' + mealGroup.id}"></td>
                                <td class="fw-bold fs-5 text-white" th:text="${mealGroup.name}"></td>
                                <td class="text-white opacity-75" th:text="${mealGroup.description}"></td>
                                <td>
                                    <ul class="list-unstyled mb-0">
                                        <li th:each="customer : ${mealGroup.customers}" class="text-white opacity-75 py-1">
                                            <span class="badge bg-info text-dark me-2" th:text="${customer.id}"></span>
                                            <span th:text="|${customer.name} ${customer.surname}|"></span>
                                        </li>
                                        <li th:if="${#lists.isEmpty(mealGroup.customers)}" class="text-secondary fst-italic py-1">
                                            Nessun cliente iscritto
                                        </li>
                                    </ul>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(mealGroups)}">
                                <td colspan="4" class="text-center py-5 text-secondary fs-4">
                                    Nessun gruppo pasto registrato.
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card shadow-lg bg-dark text-light border-secondary mb-5" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-black bg-gradient border-secondary py-4">
                    <h2 class="mb-0 text-center text-uppercase fw-light tracking-wider text-info">
                        <i class="bi bi-person-plus-fill me-2"></i>Aggiungi Cliente a Gruppo Pasto
                    </h2>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/customers/addcustomer-to-mealgroup}" method="post" class="row g-4 justify-content-center">

                        <div class="col-md-5">
                            <label for="customerId" class="form-label small text-uppercase tracking-wider text-info fw-bold">Cliente</label>
                            <select name="customerId" id="customerId" class="form-select bg-dark text-white border-secondary" required>
                                <option value="" disabled selected>Seleziona un cliente...</option>
                                <option th:each="customer : ${customers}"
                                        th:value="${customer.id}"
                                        th:text="|${customer.name} ${customer.surname}|">\n                                </option>
                            </select>
                        </div>

                        <div class="col-md-5">
                            <label for="mealGroupId" class="form-label small text-uppercase tracking-wider text-info fw-bold">Gruppo Pasto</label>
                            <select name="mealGroupId" id="mealGroupId" class="form-select bg-dark text-white border-secondary" required>
                                <option value="" disabled selected>Seleziona un gruppo...</option>
                                <option th:each="mealGroup : ${mealGroups}"
                                        th:value="${mealGroup.id}"
                                        th:text="${mealGroup.name}">
                                </option>
                            </select>
                        </div>

                        <div class="col-12 text-center mt-4">
                            <button type="submit" class="btn btn-info btn-lg px-5 py-3 fw-bold text-dark shadow hover-scale">
                                AGGIUNGI <i class="bi bi-plus-circle-fill ms-2"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<style>
    .table-dark {
        --bs-table-color: #e0e0e0;
    }
    .form-select:focus {
        border-color: #0dcaf0 !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
    }
    .hover-scale { transition: transform 0.2s; }
    .hover-scale:hover { transform: scale(1.03); }
</style>

</body>
</html>
